<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Forward Pass Simulation - def fib</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box
		}

		body {
			background: #0f172a;
			color: #e2e8f0;
			font-family: Inter, -apple-system, sans-serif;
			min-height: 100vh;
			padding: 20px 16px
		}

		.wrap {
			max-width: 600px;
			margin: 0 auto
		}

		h1 {
			font-size: 20px;
			font-weight: 800;
			text-align: center;
			color: #fff
		}

		.sub {
			text-align: center;
			color: #94a3b8;
			font-size: 12px;
			margin: 2px 0 16px
		}

		.sub code {
			color: #a78bfa
		}

		.progress {
			display: flex;
			gap: 3px;
			margin-bottom: 6px
		}

		.progress div {
			flex: 1;
			height: 4px;
			border-radius: 2px;
			background: #334155;
			transition: background .3s
		}

		.progress div.active {
			background: #f472b6
		}

		.tabs {
			display: flex;
			gap: 3px;
			margin-bottom: 16px;
			flex-wrap: wrap
		}

		.tabs button {
			flex: 1;
			min-width: 60px;
			background: #1e293b;
			color: #94a3b8;
			border: none;
			border-radius: 8px;
			padding: 8px 4px;
			font-size: 11px;
			cursor: pointer;
			font-weight: 600;
			text-align: center;
			transition: all .2s;
			opacity: .5
		}

		.tabs button.active {
			background: #f472b6;
			color: #fff;
			opacity: 1
		}

		.tabs button .icon {
			font-size: 14px;
			display: block;
			margin-bottom: 1px
		}

		.content {
			background: #1e293b;
			border-radius: 12px;
			padding: 20px 18px;
			border: 1px solid #47556933;
			min-height: 250px
		}

		.nav {
			display: flex;
			justify-content: space-between;
			margin-top: 14px
		}

		.nav button {
			border-radius: 8px;
			padding: 10px 20px;
			font-size: 13px;
			font-weight: 600;
			cursor: pointer
		}

		.nav .prev {
			background: #1e293b;
			color: #e2e8f0;
			border: 1px solid #475569
		}

		.nav .prev:disabled {
			color: #94a3b8;
			cursor: default
		}

		.nav .next {
			background: #f472b6;
			color: #fff;
			border: none
		}

		.nav .next:disabled {
			background: #334155;
			color: #94a3b8;
			cursor: default
		}

		.dim {
			font-size: 12px;
			color: #94a3b8;
			line-height: 1.6
		}

		.mono {
			font-family: monospace
		}

		.box {
			background: #0f172a;
			border-radius: 8px;
			padding: 14px;
			margin: 10px 0
		}

		.tag {
			display: inline-block;
			padding: 2px 8px;
			border-radius: 4px;
			font-size: 11px;
			font-weight: 600;
			font-family: monospace
		}

		.vec {
			display: flex;
			gap: 1px;
			flex-wrap: wrap;
			align-items: center
		}

		.vec span {
			width: 18px;
			height: 18px;
			border-radius: 2px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 7px
		}

		.vec .dots {
			font-size: 10px;
			color: #94a3b8;
			margin-left: 4px
		}

		.bar-row {
			display: flex;
			align-items: center;
			gap: 8px;
			margin-bottom: 6px
		}

		.bar-label {
			font-size: 12px;
			color: #94a3b8;
			width: 80px;
			text-align: right;
			font-family: monospace
		}

		.bar-track {
			flex: 1;
			height: 20px;
			background: #0f172a;
			border-radius: 4px;
			overflow: hidden;
			position: relative
		}

		.bar-fill {
			height: 100%;
			border-radius: 4px;
			transition: width .8s ease-out
		}

		.bar-val {
			position: absolute;
			right: 6px;
			top: 2px;
			font-size: 10px;
			color: #fff;
			font-weight: 600
		}

		.flow-arrow {
			text-align: center;
			color: #94a3b8;
			font-size: 16px;
			margin: 4px 0
		}

		.token-row {
			display: flex;
			gap: 6px;
			justify-content: center;
			margin: 12px 0
		}

		.token {
			border-radius: 8px;
			padding: 6px 10px;
			font-family: monospace;
			font-size: 14px;
			font-weight: 600;
			min-width: 36px;
			text-align: center;
			border: 2px solid transparent;
			transition: all .2s
		}

		.token .pos {
			font-size: 9px;
			color: #94a3b8;
			margin-top: 2px
		}

		.subbtns {
			display: flex;
			gap: 4px;
			margin-bottom: 14px;
			flex-wrap: wrap
		}

		.subbtns button {
			background: #334155;
			color: #94a3b8;
			border: none;
			border-radius: 6px;
			padding: 6px 10px;
			font-size: 11px;
			cursor: pointer;
			font-weight: 600;
			transition: all .2s
		}

		.subbtns button.active {
			color: #fff
		}

		.dots-row {
			display: flex;
			gap: 4px;
			justify-content: center;
			margin-top: 12px
		}

		.dot {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			transition: background .3s
		}
	</style>
</head>

<body>
	<div class="wrap">
		<h1>Forward Pass Simulation</h1>
		<p class="sub">tracing <code>"def fib"</code> through a 50M param transformer</p>
		<div class="progress" id="progress"></div>
		<div class="tabs" id="tabs"></div>
		<div class="content" id="content"></div>
		<div class="nav">
			<button class="prev" id="prevBtn" onclick="go(-1)">← Prev</button>
			<button class="next" id="nextBtn" onclick="go(1)">Next →</button>
		</div>
	</div>

	<script>
		const STAGES = [
			{id: "input", label: "Input", icon: "📝"},
			{id: "tokenize", label: "Tokenize", icon: "✂️"},
			{id: "embed", label: "Embed", icon: "📊"},
			{id: "block", label: "Block 1", icon: "⚙️"},
			{id: "blocks", label: "Blocks 2-12", icon: "🔁"},
			{id: "output", label: "Output", icon: "🎯"}
		];
		let stage = 0, blockSub = 0;

		function go(d) {stage = Math.max(0, Math.min(STAGES.length - 1, stage + d)); render();}

		function fakeVec(seed, n = 14) {let v = []; for (let i = 0; i < n; i++)v.push(parseFloat((Math.sin(seed * (i + 1) * 0.7) * 0.3).toFixed(2))); return v;}

		function vecHTML(vals, color) {
			return `<div class="vec">${vals.map(v => {
				let int = Math.abs(v) / 0.5, bg = v >= 0 ? `rgba(16,185,129,${int})` : `rgba(239,68,68,${int})`;
				return `<span style="background:${bg};border:1px solid ${color}33">${v > 0 ? '+' : v < 0 ? '−' : '0'}</span>`;
			}).join('')}<span class="dots">...512</span></div>`;
		}

		function barHTML(data, maxV) {
			let mx = maxV || Math.max(...data.map(d => d.value));
			return data.map(d => `<div class="bar-row">
    <div class="bar-label">${d.label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${(d.value / mx) * 100}%;background:linear-gradient(90deg,${d.color}88,${d.color})"></div><span class="bar-val">${d.display}</span></div>
  </div>`).join('');
		}

		function renderInput() {
			return `<div style="text-align:center;padding:20px">
    <div class="dim" style="margin-bottom:12px">raw text input 2 the model:</div>
    <div style="display:inline-block;background:#0f172a;border-radius:10px;padding:16px 32px;border:2px solid #a78bfa;font-family:monospace;font-size:28px;font-weight:700;color:#a78bfa;letter-spacing:2px">def fib</div>
    <div class="dim" style="margin-top:16px">just a string of characters. the model has no idea what this means yet.<br>step 1: convert 2 token IDs the model can work w/.</div>
  </div>`;
		}

		function renderTokenize() {
			return `<div>
    <div class="dim" style="margin-bottom:12px">BPE tokenizer splits text into subword tokens & maps each 2 an integer ID.</div>
    <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap">
      <div class="box" style="text-align:center;padding:12px 20px;border:1px solid #475569">
        <div style="font-family:monospace;font-size:24px;color:#f59e0b;font-weight:700">def</div>
        <div class="flow-arrow">↓</div>
        <div class="tag" style="background:#f59e0b20;color:#f59e0b;font-size:18px;padding:6px 16px">142</div>
      </div>
      <div class="box" style="text-align:center;padding:12px 20px;border:1px solid #475569">
        <div style="font-family:monospace;font-size:24px;color:#3b82f6;font-weight:700">fib</div>
        <div class="flow-arrow">↓</div>
        <div class="tag" style="background:#3b82f620;color:#3b82f6;font-size:18px;padding:6px 16px">3891</div>
      </div>
    </div>
    <div style="margin-top:16px;background:#334155;border-radius:8px;padding:12px;font-size:11px;color:#94a3b8;text-align:center">vocab size: 8,192 tokens. each ID maps 2 a row in the embedding matrix.</div>
  </div>`;
		}

		function renderEmbed() {
			let e1 = fakeVec(142), e2 = fakeVec(3891);
			return `<div>
    <div class="dim" style="margin-bottom:12px">each token ID indexes into a learned embedding table (8192 × 512). dense 512-dim vector per token.</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:200" class="box">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span class="mono" style="color:#f59e0b;font-weight:700;font-size:14px">142</span>
          <span style="color:#94a3b8;font-size:11px">→</span>
          <span style="color:#f59e0b;font-size:12px;font-weight:600">"def" embedding</span>
        </div>
        ${vecHTML(e1, '#f59e0b')}
      </div>
      <div style="flex:1;min-width:200" class="box">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span class="mono" style="color:#3b82f6;font-weight:700;font-size:14px">3891</span>
          <span style="color:#94a3b8;font-size:11px">→</span>
          <span style="color:#3b82f6;font-size:12px;font-weight:600">"fib" embedding</span>
        </div>
        ${vecHTML(e2, '#3b82f6')}
      </div>
    </div>
    <div style="margin-top:12px;background:#10b98115;border:1px solid #10b98133;border-radius:8px;padding:10px;font-size:11px;color:#94a3b8">
      <strong style="color:#10b981">params:</strong> 8,192 × 512 = 4,194,304 embedding params. learned during training.
    </div>
  </div>`;
		}

		const blockSubs = [
			{l: "RMSNorm", c: "#22d3ee", d: "normalize both token vectors 2 unit scale. prevents activations from exploding. gamma rescales each dim."},
			{l: "Attention + RoPE", c: "#f472b6", d: "\"fib\" computes Q, attends 2 \"def\" (score 0.8) and itself (0.2). RoPE encodes that \"def\" is 1 position back. result: \"fib\" now knows it follows a keyword."},
			{l: "+ Residual", c: "#10b981", d: "add the original pre-attention \"fib\" vector back. skip connection lets gradients flow & preserves original signal."},
			{l: "RMSNorm", c: "#22d3ee", d: "normalize again b4 the feedforward pass. same operation — stabilize, then scale w/ learned gamma."},
			{l: "SwiGLU FFN", c: "#f59e0b", d: "each token independently: gate = swish(x\u00B7W_gate), up = x\u00B7W_up, out = (gate \u2299 up)\u00B7W_down. nonlinear transformation."},
			{l: "+ Residual", c: "#10b981", d: "add original pre-FFN vector back. 2 residual connections per block = 2 gradient highways."}
		];

		function renderBlock() {
			let subContent = '';
			if (blockSub === 0) {
				subContent = `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px">
      <div style="flex:1;min-width:140"><div style="font-size:10px;color:#94a3b8;margin-bottom:4px">before (raw)</div>
        <div style="display:flex;gap:1px">${[0.8, -2.1, 0.3, 1.5, -0.7, 0.1, 3.2, -1.8].map(v => `<div style="height:24px;flex:1;border-radius:2px;display:flex;align-items:center;justify-content:center;background:${v > 0 ? `rgba(16,185,129,${Math.abs(v) / 4})` : `rgba(239,68,68,${Math.abs(v) / 4})`};font-size:8px;color:#94a3b8">${v}</div>`).join('')}</div>
      </div>
      <div style="flex:1;min-width:140"><div style="font-size:10px;color:#22d3ee;margin-bottom:4px">after RMSNorm</div>
        <div style="display:flex;gap:1px">${[0.42, -1.1, 0.16, 0.79, -0.37, 0.05, 1.68, -0.95].map(v => `<div style="height:24px;flex:1;border-radius:2px;display:flex;align-items:center;justify-content:center;background:${v > 0 ? `rgba(34,211,238,${Math.abs(v) / 2})` : `rgba(239,68,68,${Math.abs(v) / 2})`};font-size:8px;color:#94a3b8">${v}</div>`).join('')}</div>
      </div>
    </div>`;
			} else if (blockSub === 1) {
				subContent = `<div style="display:flex;justify-content:center;gap:24px;margin:12px 0">
      ${[{t: "def", s: "0.80", c: "#f59e0b"}, {t: "fib", s: "0.20", c: "#3b82f6"}].map(t => `<div style="text-align:center">
        <div class="mono" style="color:${t.c};font-weight:700;font-size:16px">${t.t}</div>
        <div style="width:60px;height:8px;background:#0f172a;border-radius:4px;margin-top:4px;overflow:hidden"><div style="width:${t.s * 100}%;height:100%;background:#f472b6;border-radius:4px"></div></div>
        <div style="font-size:11px;color:#f472b6;font-weight:600;margin-top:2px">${t.s}</div>
      </div>`).join('')}
    </div>
    <div style="font-size:10px;color:#94a3b8;text-align:center">"fib" attends 80% 2 "def", 20% 2 itself. output = weighted combo of Value vectors.</div>`;
			} else if (blockSub === 4) {
				subContent = `<div style="display:flex;justify-content:center;gap:6px;margin:10px 0;flex-wrap:wrap">
      ${["x\u00B7W_gate", "swish()", "x\u00B7W_up", "gate \u2299 up", "\u00B7W_down"].map(s => `<div style="background:#f59e0b20;border-radius:6px;padding:4px 10px;font-size:11px;color:#f59e0b;font-family:monospace;font-weight:600">${s}</div>`).join('')}
    </div>
    <div style="font-size:10px;color:#94a3b8;text-align:center">512 → 1376 (gate & up) → element-wise multiply → 512 (down)</div>`;
			}

			return `<div>
    <div class="dim" style="margin-bottom:12px">block 1 of 12. each block: RMSNorm → Attention → +Residual → RMSNorm → SwiGLU → +Residual</div>
    <div class="subbtns">${blockSubs.map((s, i) => `<button class="${blockSub === i ? 'active' : ''}" style="${blockSub === i ? `background:${s.c};color:#fff` : ''}" onclick="blockSub=${i};render()">${s.l}</button>`).join('')}</div>
    <div class="box" style="border-left:3px solid ${blockSubs[blockSub].c};min-height:100px">
      <div style="color:${blockSubs[blockSub].c};font-weight:700;font-size:14px;margin-bottom:4px">${blockSubs[blockSub].l}</div>
      <div class="dim">${blockSubs[blockSub].d}</div>
      ${subContent}
    </div>
    <div class="dots-row">${blockSubs.map((_, i) => `<div class="dot" style="background:${i <= blockSub ? blockSubs[i].c : '#334155'}"></div>`).join('')}</div>
  </div>`;
		}

		function renderBlocks() {
			let layers = [
				{range: "1-4", label: "Syntax", desc: "brackets, indentation, keyword patterns", c: "#22d3ee", pct: 33},
				{range: "5-8", label: "Semantics", desc: "variable types, function signatures, scope", c: "#a78bfa", pct: 66},
				{range: "9-12", label: "High-Level", desc: "algorithm structure, code intent, naming", c: "#f472b6", pct: 100}
			];
			return `<div>
    <div class="dim" style="margin-bottom:14px">same block repeats 12x. each layer builds more abstract representations.</div>
    ${layers.map(l => `<div class="box" style="border-left:3px solid ${l.c};padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="color:${l.c};font-weight:700;font-size:13px">Blocks ${l.range}: ${l.label}</span>
        <span style="font-size:10px;color:#94a3b8">${l.pct}%</span>
      </div>
      <div style="font-size:11px;color:#94a3b8;margin-bottom:6px">${l.desc}</div>
      <div style="height:6px;background:#334155;border-radius:3px;overflow:hidden"><div style="width:${l.pct}%;height:100%;border-radius:3px;background:linear-gradient(90deg,${l.c}66,${l.c})"></div></div>
    </div>`).join('')}
    <div style="margin-top:12px;background:#334155;border-radius:8px;padding:10px;font-size:11px;color:#94a3b8;text-align:center">24 residual connections total (2 per block × 12 blocks)</div>
  </div>`;
		}

		function renderOutput() {
			let preds = [{t: "onacci", p: 67, c: "#10b981"}, {t: "_", p: 12, c: "#f59e0b"}, {t: "(", p: 8, c: "#94a3b8"}, {t: "o", p: 4, c: "#94a3b8"}, {t: "er", p: 3, c: "#94a3b8"}];
			return `<div>
    <div class="dim" style="margin-bottom:14px">final hidden state → unembedding → logits → softmax → probabilities over 8,192 tokens.</div>
    <div class="box">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:6px">final hidden state @ position 2:</div>
      ${vecHTML(fakeVec(999), '#a78bfa')}
    </div>
    <div style="text-align:center;font-size:12px;color:#a78bfa;font-family:monospace;margin:8px 0">hidden × W_embed<sup>T</sup> → logits [8192] → softmax</div>
    <div class="box">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:10px">top predictions 4 next token after "fib":</div>
      ${barHTML(preds.map(p => ({label: `"${p.t}"`, value: p.p, display: (p.p / 100).toFixed(2), color: p.c})), 70)}
    </div>
    <div style="margin-top:14px;text-align:center;padding:16px;background:#10b98115;border:2px solid #10b981;border-radius:10px">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">argmax → predicted next token:</div>
      <div class="mono" style="font-size:28px;font-weight:700;color:#10b981">"onacci"</div>
      <div style="margin-top:8px;font-size:13px;font-weight:600;color:#a78bfa">def fib → def fibonacci ✨</div>
    </div>
  </div>`;
		}

		const renderers = [renderInput, renderTokenize, renderEmbed, renderBlock, renderBlocks, renderOutput];

		function render() {
			document.getElementById('progress').innerHTML = STAGES.map((_, i) => `<div class="${i <= stage ? 'active' : ''}"></div>`).join('');
			document.getElementById('tabs').innerHTML = STAGES.map((s, i) => `<button class="${stage === i ? 'active' : ''}" onclick="stage=${i};blockSub=0;render()"><span class="icon">${s.icon}</span>${s.label}</button>`).join('');
			document.getElementById('content').innerHTML = renderers[stage]();
			document.getElementById('prevBtn').disabled = stage === 0;
			document.getElementById('nextBtn').disabled = stage === STAGES.length - 1;
		}

		render();
	</script>
</body>

</html>
