name: "Python-Llama-50M"
overwrite: false

data:
  input_file: "data/python_train.jsonl"
  validation_file: "data/python_val.jsonl"
  tokenizer_path: "tokenizer"
  preprocessing:
    max_context_size: 2048
    chunk_overlap: 0
  tokenizer:
    normal_vocab_size: 8192
    special_tokens:
      pad: "<|pad|>"
      bos: "<|file_start|>"
      eos: "<|file_end|>"

model:
  architecture: "llama"
  dimensions:
    hidden_size: 512
    intermediate_size: 1376
    num_layers: 12
  attention:
    num_heads: 8
    num_kv_heads: null
    head_dim: null
    max_position_embeddings: 2048
  normalization:
    rms_norm_eps: 1.0e-5
  rope:
    theta: 10000
    traditional: false
    scaling: null
  misc:
    attention_bias: false
    mlp_bias: false
    tie_word_embeddings: true

training:
  epochs: 1
  hyperparameters:
    batch_size: 8
    learning_rate: 3.0e-4
    weight_decay: 0.01
  scheduler:
    type: "cosine"
    min_lr_ratio: 0.01
  optimization:
    optimizer: "adamw"

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  steps:
    logging_interval: 10
    checkpoint_interval: 5000
    validation_interval: 500
  metrics:
    log_loss: true
    log_perplexity: true
    log_tokens_per_second: true
    log_learning_rate: true
    log_tokens_processed: true

system:
  seed: 42
  device: "gpu"
